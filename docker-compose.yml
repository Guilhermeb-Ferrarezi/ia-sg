services:
  api:
    build:
      context: ./api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "3000"
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${PORT:-3000}:3000"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:3000/api/system/readiness >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_WS_URL: ${VITE_WS_URL:-/ws}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8087}:81"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:81 >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
